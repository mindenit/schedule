name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0 # keep in sync with packageManager version in package.json
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Restore .nuxt cache
        uses: actions/cache@v4
        with:
          path: .nuxt
          key: nuxt-${{ hashFiles('nuxt.config.ts', 'pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm prettier

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Silence the Nuxt telemetry prompt in CI
          NUXT_TELEMETRY_DISABLED: "1"
          # Satisfy the prod env-var check in nuxt.config.ts
          NUXT_OG_IMAGE_SECRET: "ci-placeholder-not-a-real-secret"
