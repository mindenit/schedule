name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Select group "..."
        3. Navigate to week view
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "Chrome 125 / macOS 14"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or console errors
      description: Paste a screenshot or browser console output if relevant.
    validations:
      required: false
